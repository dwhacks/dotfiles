[custom.giturl]
description = "Display symbol for remote Git server"
command = """
set GIT_REMOTE (git remote get-url origin 2>/dev/null)
if string match -r github $GIT_REMOTE >/dev/null 2>&1
    echo -n "  "
else if string match -r gitlab $GIT_REMOTE >/dev/null 2>&1
    echo -n " "
else if string match -r bitbucket $GIT_REMOTE >/dev/null 2>&1
    echo -n " "
else
    echo -n " "
end
"""
when = 'git rev-parse --is-inside-work-tree >/dev/null 2>&1'
format = "$output"
require_repo = true
ignore_timeout = true


[git_branch] 
symbol = "[](surface0) "
style = "fg:lavender bg:surface0"
format =  "  [$symbol$branch]($style)[](surface0)"

# [git_status] 
# MINIMAL git status 
# format = " [($all_status$ahead_behind )]($style)"
# ahead    = "⇡${count} "
# behind   = "⇣${count} "
# diverged = "⇕⇡${ahead_count}⇣${behind_count} "

[git_status]
format = "[$staged$modified$renamed$conflicted$ahead_behind]($style)"
# options available for format
staged     = "[+${count} ](green)"
modified   = "[!${count} ](yellow)"
renamed    = "[»${count} ](blue)"
deleted    = "[-${count} ](red)"
untracked  = "[?${count} ](sapphire)"
stashed    = "[≡${count} ](lavender)"
conflicted = "[✖${count} ](red bold)"
ahead      = "[⇡${count} ](teal)"
behind     = "[⇣${count} ](peach)"
diverged   = "[⇕⇡${ahead_count}⇣${behind_count} ](mauve)"

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
set common_dir (git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
set git_dir (git rev-parse --path-format=absolute --git-dir 2>/dev/null)
if test "$common_dir" != "$git_dir"
    echo -n "⛓ "
end
"""
when = 'git rev-parse --is-inside-work-tree >/dev/null 2>&1'
format = " ([$output ]($style))"
style = "bold green"
require_repo = true
ignore_timeout = true

